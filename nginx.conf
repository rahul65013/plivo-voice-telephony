# /etc/nginx/sites-available/plivo-server
#
# Nginx sits in front of your Node.js server.
# It handles:
#   1. SSL termination (HTTPS + WSS) via Let's Encrypt cert
#   2. Reverse proxy HTTP → Node on port 8080
#   3. WebSocket upgrade for /stream → Node on port 8080
#
# After placing this file:
#   sudo ln -s /etc/nginx/sites-available/plivo-server /etc/nginx/sites-enabled/
#   sudo nginx -t && sudo systemctl reload nginx

# Redirect HTTP → HTTPS
server {
    listen 80;
    server_name YOUR_DOMAIN_HERE;   # e.g. calls.yourdomain.com

    # Let's Encrypt ACME challenge
    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS + WSS server
server {
    listen 443 ssl;
    server_name YOUR_DOMAIN_HERE;

    # ── SSL certs (managed by certbot) ─────────────────────────────────────
    ssl_certificate     /etc/letsencrypt/live/YOUR_DOMAIN_HERE/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/YOUR_DOMAIN_HERE/privkey.pem;

    # Modern SSL settings
    ssl_protocols             TLSv1.2 TLSv1.3;
    ssl_ciphers               HIGH:!aNULL:!MD5;
    ssl_prefer_server_ciphers on;
    ssl_session_cache         shared:SSL:10m;
    ssl_session_timeout       10m;

    # ── WebSocket /stream → Node.js ────────────────────────────────────────
    # Plivo opens a WebSocket here per call.
    # Critical: proxy_read_timeout must be long (calls can last 30+ min).
    location /stream {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        # WebSocket upgrade headers
        proxy_set_header Upgrade    $http_upgrade;
        proxy_set_header Connection "upgrade";

        # Pass real client IP to Node
        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Long timeouts for persistent WS connections
        proxy_read_timeout    86400s;  # 24h — match Plivo's streamTimeout
        proxy_send_timeout    86400s;
        proxy_connect_timeout 10s;

        # Disable buffering for real-time audio streaming
        proxy_buffering off;
    }

    # ── HTTP routes (/answer, /hangup, /health, /make-call) → Node.js ──────
    location / {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;

        proxy_set_header Host              $host;
        proxy_set_header X-Real-IP         $remote_addr;
        proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        proxy_read_timeout    30s;
        proxy_connect_timeout 10s;
    }

    # ── Security headers ────────────────────────────────────────────────────
    add_header X-Frame-Options       DENY;
    add_header X-Content-Type-Options nosniff;

    # ── Logging ─────────────────────────────────────────────────────────────
    access_log /var/log/nginx/plivo-server.access.log;
    error_log  /var/log/nginx/plivo-server.error.log warn;
}
